<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OficinaTech - Agendamento de Serviço</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style-cliente.css">
</head>
<body class="bg-dark">

    <header class="bg-dark text-white text-center py-4 mb-5 shadow-sm">
        <div class="container">
            <h1 class="h3 mb-0">⚙️ OficinaTech</h1>
            <p class="text-white-50 mb-0">Agende seu atendimento de forma rápida e fácil</p>
        </div>
    </header>

    <div class="container mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow border-0 rounded-3">
                    <div class="card-body p-5">
                        <h2 class="h4 mb-4 text-center text-primary">Preencha os dados do agendamento</h2>
                        
                        <form id="formAgendamento">
                            <h5 class="border-bottom pb-2 mb-3 mt-4 text-secondary">1. Seus Dados</h5>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="nome" class="form-label">Nome Completo</label>
                                    <input type="text" class="form-control" id="nome" required placeholder="Ex: João da Silva">
                                </div>
                                <div class="col-md-6">
                                    <label for="email" class="form-label">E-mail</label>
                                    <input type="email" class="form-control" id="email" required placeholder="joao@email.com">
                                </div>
                                <div class="col-md-6">
                                    <label for="telefone" class="form-label">WhatsApp</label>
                                    <input type="tel" class="form-control" id="telefone" required placeholder="(00) 00000-0000">
                                </div>
                            </div>

                            <h5 class="border-bottom pb-2 mb-3 mt-4 text-secondary">2. Dados do Veículo</h5>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="modelo" class="form-label">Modelo do Veículo</label>
                                    <input type="text" class="form-control" id="modelo" required placeholder="Ex: Honda Civic">
                                </div>
                                <div class="col-md-6">
                                    <label for="ano" class="form-label">Ano</label>
                                    <input type="number" class="form-control" id="ano" required placeholder="Ex: 2018">
                                </div>
                            </div>

                            <h5 class="border-bottom pb-2 mb-3 mt-4 text-secondary">3. Detalhes do Serviço</h5>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="servico" class="form-label">Tipo de Serviço</label>
                                    <select class="form-select" id="servico" required>
                                        <option value="" selected disabled>Selecione uma opção...</option>
                                        <option value="revisao">Revisão Geral</option>
                                        <option value="oleo">Troca de Óleo/Filtros</option>
                                        <option value="suspensao">Suspensão e Freios</option>
                                        <option value="motor">Mecânica de Motor</option>
                                        <option value="outro">Outro (Descrever abaixo)</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label for="dataHora" class="form-label">Preferência de Data/Hora</label>
                                    <input type="datetime-local" class="form-control" id="dataHora" required>
                                </div>
                                <div class="col-12">
                                    <label for="problema" class="form-label">Descreva o problema ou barulho (Opcional)</label>
                                    <textarea class="form-control" id="problema" rows="3" placeholder="Ex: Escuto um estalo na roda direita ao virar o volante..."></textarea>
                                </div>
                            </div>

                            <div class="d-grid mt-5">
                                <button type="submit" class="btn btn-primary btn-lg">Solicitar Agendamento</button>
                            </div>
                        </form>

                        <div id="mensagemSucesso" class="alert alert-success mt-4 d-none text-center" role="alert">
                            <h4 class="alert-heading">Pedido Registrado!</h4>
                            <p>Recebemos sua solicitação. Você receberá um E-mail e um WhatsApp com o número do seu pedido para acompanhar o status!</p>
                            <hr>
                            <button class="btn btn-outline-success btn-sm" onclick="location.reload()">Fazer Novo Agendamento</button>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/script-cliente.js"></script>
</body>
</html>
